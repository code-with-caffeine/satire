<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>IGNORANCE RUNNER — Political Satire Platformer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #0d0d1a;
      overflow: hidden;
      touch-action: none;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      cursor: pointer;
      touch-action: none;
    }

    #jump-btn {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 40px);
      max-width: 500px;
      background: rgba(201, 162, 39, 0.18);
      color: #FFD700;
      border: 2px solid #c9a227;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(11px, 3.5vw, 16px);
      padding: 18px 0;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 2px;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.08s;
      text-align: center;
      z-index: 10;
    }

    #jump-btn:active {
      background: rgba(201, 162, 39, 0.5);
    }
  </style>
</head>

<body>
  <canvas id="c"></canvas>
  <button id="jump-btn" aria-label="Jump">▲ &nbsp; JUMP &nbsp; ▲</button>
  <script>
    /* ════════════════════════════════════════════════════════════════
       SPRITE CONFIG
       ════════════════════════════════════════════════════════════════ */
    const SPRITE_PATHS = {
      politician: './politician.png',
      hospital: null, school: null, water: null, road: null,
      power: null, farmer: null, sewage: null, coin: null,
      journalist: './press.png',
    };

    /* ─── CANVAS ────────────────────────────────────────────────── */
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const dpr = Math.min(window.devicePixelRatio || 1, 3);
    let W, H, GY;
    function initCanvas() {
      W = window.innerWidth; H = window.innerHeight; GY = Math.floor(H * 0.77);
      canvas.width = Math.round(W * dpr); canvas.height = Math.round(H * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', () => { initCanvas(); if (P) P.y = GY - P.h; });
    initCanvas();

    /* ─── SPRITES ───────────────────────────────────────────────── */
    const sprites = {};
    function loadSprites(cb) {
      const entries = Object.entries(SPRITE_PATHS).filter(([, v]) => v);
      let pending = entries.length;
      if (!pending) { cb(); return; }
      for (const [key, path] of entries) {
        const img = new Image();
        img.onload = () => { sprites[key] = img; if (--pending === 0) cb(); };
        img.onerror = () => { if (--pending === 0) cb(); };
        img.src = path;
      }
    }

    /* ─── MOBILE BUTTON ─────────────────────────────────────────── */
    const jumpBtn = document.getElementById('jump-btn');
    const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
    if (isTouch) jumpBtn.style.display = 'block';
    jumpBtn.addEventListener('touchstart', e => { e.preventDefault(); doJump(); }, { passive: false });

    /* ════════════════════════════════════════════════════════════════
       AUDIO ENGINE — Web Audio API, fully synthesized (no files)
       All sounds are generated procedurally so nothing extra to host.
       ════════════════════════════════════════════════════════════════ */
    let _ac = null;
    function AC() {
      if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
      if (_ac.state === 'suspended') _ac.resume();
      return _ac;
    }

    function sfx(type) {
      try {
        const a = AC(), t = a.currentTime;

        // Tiny helper: oscillator → gain → destination, auto-stops
        function tone(wave, freq, vol, dur, freqEnd = null, startDelay = 0) {
          const o = a.createOscillator(), g = a.createGain();
          o.type = wave; o.frequency.value = freq;
          if (freqEnd !== null) o.frequency.exponentialRampToValueAtTime(freqEnd, t + startDelay + dur);
          g.gain.setValueAtTime(vol, t + startDelay);
          g.gain.exponentialRampToValueAtTime(0.0001, t + startDelay + dur);
          o.connect(g); g.connect(a.destination);
          o.start(t + startDelay); o.stop(t + startDelay + dur + 0.01);
        }

        // Noise burst: returns a BufferSource
        function noise(vol, dur, lpFreq = 2000, startDelay = 0) {
          const bufLen = Math.ceil(a.sampleRate * (dur + 0.02));
          const buf = a.createBuffer(1, bufLen, a.sampleRate);
          const d = buf.getChannelData(0);
          for (let i = 0; i < bufLen; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / bufLen);
          const src = a.createBufferSource(), g = a.createGain();
          const lp = a.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = lpFreq;
          src.buffer = buf;
          g.gain.setValueAtTime(vol, t + startDelay);
          g.gain.exponentialRampToValueAtTime(0.0001, t + startDelay + dur);
          src.connect(lp); lp.connect(g); g.connect(a.destination);
          src.start(t + startDelay); src.stop(t + startDelay + dur + 0.02);
        }

        switch (type) {

          // ── JUMP (first jump) — quick ascending square blip
          case 'jump':
            tone('square', 200, 0.14, 0.11, 420);
            break;

          // ── DOUBLE JUMP — higher pitched two-step
          case 'doublejump':
            tone('square', 320, 0.12, 0.07, 540);
            tone('square', 540, 0.10, 0.07, 760, 0.04);
            break;

          // ── COIN — ascending chime triad
          case 'coin':
            tone('sine', 660, 0.12, 0.13, 660, 0.00);
            tone('sine', 880, 0.11, 0.13, 880, 0.05);
            tone('sine', 1100, 0.09, 0.13, 1100, 0.10);
            break;

          // ── HIT (runs into a need) — thud + low grunt
          case 'hit':
            noise(0.30, 0.14, 180);
            tone('triangle', 90, 0.20, 0.18, 40);
            break;

          // ── STOMP (on journalist) — satisfying pop-crunch
          case 'stomp':
            noise(0.35, 0.09, 600);
            tone('sine', 180, 0.18, 0.10, 55);
            break;

          // ── SARCASTIC (jumped over a need) — light dismissive whoosh
          case 'sarcastic':
            tone('sine', 240, 0.07, 0.09, 520);
            break;

          // ── NEAR MISS — sharp tense buzz
          case 'nearmiss':
            tone('sawtooth', 900, 0.09, 0.07, 220);
            break;

          // ── COMBO — escalating ping per streak level
          case 'combo': {
            const base = Math.min(400 + combo * 90, 1400);
            tone('square', base, 0.10, 0.09, base * 1.4);
            if (combo >= 4) tone('square', base * 1.4, 0.08, 0.07, base * 2, 0.06);
            break;
          }

          // ── SCANDAL — triumphant fanfare arpeggio
          case 'scandal':
            [523, 659, 784, 1047].forEach((f, i) => tone('sawtooth', f, 0.12, 0.15, f, i * 0.07));
            break;

          // ── JOURNALIST CAUGHT (not stomped) — urgent alarm sting
          case 'caught':
            tone('sawtooth', 440, 0.14, 0.06, 220);
            tone('sawtooth', 330, 0.12, 0.08, 165, 0.06);
            break;

          // ── GAME OVER — sad descending motif
          case 'gameover':
            [392, 330, 262, 196].forEach((f, i) => tone('sawtooth', f, 0.12, 0.20, f * 0.6, i * 0.18));
            break;

          // ── PHASE UP — subtle level-up chime
          case 'phaseup':
            [440, 554, 659, 880].forEach((f, i) => tone('sine', f, 0.10, 0.12, f, i * 0.06));
            break;
        }
      } catch (e) { } // audio unavailable → silent
    }

    /* ─── QUOTES ────────────────────────────────────────────────── */
    const MUTTER_QUOTES = [
      'Ow!!', 'Who put this here?!', 'Move, damn it!', '*grumbles*',
      "This is beneath me.", "I don't see this.", 'Hmph!', 'Out of my way!',
      "...didn't happen.", 'Inconvenient!', 'Ugh, not now!', 'I am VERY busy.',
      'Unacceptable!', 'My suit!!', 'Do you know who I am?!',
    ];

    /* ─── GAME STATE ────────────────────────────────────────────── */
    let state = 'start';
    let score = 0, bestScore = 0, health = 100, ego = 0;
    let frame = 0, scrollX = 0, speed = 2.0, needsIgnored = 0;
    let egoHits = 0, slowdown = 0, screenShake = 0, gameOverMsg = '';
    let combo = 0, comboTimer = 0, invincible = 0;
    let speedLines = [], scandals = [], nextScandalFrame = 650;
    let diffPhase = 0;  // 0=easy  1=medium  2=hard  3=brutal

    /* ────────────────────────────────────────────────────────────────
       IMPROVED SPAWN SYSTEM
       Uses a phase-based pattern scheduler instead of fragile modulo.
       Phases unlock as score increases, adding pattern variety and
       tighter gaps — no overlapping, guaranteed by lastNeedRightEdge.
       ──────────────────────────────────────────────────────────────── */
    let nextSpawnFrame = 150;   // when to attempt next spawn
    let lastNeedRightX = -9999; // rightmost world-x of the last spawned need cluster

    const PHASES = [
      // 0 — Easy: single needs, wide breathing room
      { minScore: 0, patterns: ['single'], minGap: () => W * 0.62, delay: [240, 480] },
      // 1 — Medium: occasional doubles, medium gap
      { minScore: 60, patterns: ['single', 'single', 'double'], minGap: () => W * 0.50, delay: [200, 380] },
      // 2 — Hard: doubles become common, first triples
      { minScore: 160, patterns: ['single', 'double', 'double', 'triple'], minGap: () => W * 0.40, delay: [160, 310] },
      // 3 — Brutal: frequent doubles/triples, narrow gaps
      { minScore: 300, patterns: ['double', 'double', 'triple', 'triple'], minGap: () => W * 0.34, delay: [130, 260] },
    ];

    function currentPhase() {
      for (let i = PHASES.length - 1; i >= 0; i--) if (score >= PHASES[i].minScore) return PHASES[i];
      return PHASES[0];
    }

    /* Single need — optionally taller in later phases */
    function _mkNeed(x, heightBonus = 0) {
      const t = NEED_TYPES[ri(0, NEED_TYPES.length - 1)];
      const h = 75 + heightBonus;
      return { x, y: GY - h, w: 64, h, passed: false, collided: false, nearMiss: false, ...t };
    }

    function spawnPattern(pattern) {
      const base = scrollX + W + 80;
      const phase = currentPhase();
      // Taller needs appear from phase 2 onwards, randomly
      const tall = diffPhase >= 2 && Math.random() < 0.35 ? ri(15, 30) : 0;
      let rightEdge = base;

      switch (pattern) {
        case 'single': {
          needs.push(_mkNeed(base, tall));
          rightEdge = base + 64;
          break;
        }
        case 'double': {
          // Two needs with a gap the player must jump across or double-jump over
          // Gap scales down with phase so early doubles feel manageable
          const gapMin = diffPhase >= 2 ? 88 : 110;
          const gapMax = diffPhase >= 2 ? 135 : 165;
          const gap = ri(gapMin, gapMax);
          needs.push(_mkNeed(base, tall));
          needs.push(_mkNeed(base + 64 + gap, ri(0, 1) === 0 ? tall : 0));
          rightEdge = base + 64 + gap + 64;
          break;
        }
        case 'triple': {
          // Three needs — requires either two precise jumps or creative double-jumps
          const g1 = ri(95, 130), g2 = ri(95, 130);
          needs.push(_mkNeed(base, 0));
          needs.push(_mkNeed(base + 64 + g1, tall));
          needs.push(_mkNeed(base + 64 + g1 + 64 + g2, 0));
          rightEdge = base + 64 + g1 + 64 + g2 + 64;
          break;
        }
      }

      lastNeedRightX = rightEdge;
    }

    function tickSpawn() {
      const ph = currentPhase();

      // Phase-up notification
      const newPhase = PHASES.findIndex((p, i) => score >= p.minScore && (i === PHASES.length - 1 || score < PHASES[i + 1].minScore));
      if (newPhase > diffPhase) { diffPhase = newPhase; sfx('phaseup'); }

      if (frame < nextSpawnFrame) return;

      const candidateX = scrollX + W + 80;
      const gap = candidateX - lastNeedRightX;

      if (gap >= ph.minGap()) {
        // Pick a random pattern from current phase
        const pArr = ph.patterns;
        spawnPattern(pArr[ri(0, pArr.length - 1)]);
        nextSpawnFrame = frame + ri(ph.delay[0], ph.delay[1]);
      } else {
        nextSpawnFrame = frame + 20; // gap too small — retry soon
      }
    }

    /* ─── PLAYER ────────────────────────────────────────────────── */
    const SF = 2;
    const P = { x: 0, y: 0, w: 38 * SF, h: 56 * SF, vx: 0, vy: 0, onGround: false, jumps: 2, wf: 0, wt: 0 };
    const GRAV = 0.58, JF = -14.2;
    const BASE_X = () => Math.floor(W * 0.15);

    /* ─── POOLS ─────────────────────────────────────────────────── */
    let needs = [], coins = [], journalists = [], particles = [], bubbles = [];

    /* ─── NEED TYPES ────────────────────────────────────────────── */
    const NEED_TYPES = [
      { type: 'hospital', color: '#c0392b', label: 'HOSPITAL', quotes: ['Not now!', 'No budget!', 'Next term!', 'Defer it!'] },
      { type: 'school', color: '#2980b9', label: 'SCHOOL', quotes: ['Kids wait!', 'Study later!', 'No funds!', 'Who cares?'] },
      { type: 'water', color: '#16a085', label: 'CLEAN WATER', quotes: ['Drink chai!', 'No priority!', 'Boil it!', 'Not my job!'] },
      { type: 'road', color: '#d35400', label: 'ROADS', quotes: ['Use chopper!', 'Walk!', 'No cash!', 'Later!'] },
      { type: 'power', color: '#8e44ad', label: 'ELECTRICITY', quotes: ['Use candles!', 'Solar? LOL!', 'No plan!', 'Darkness builds character!'] },
      { type: 'farmer', color: '#27ae60', label: 'FARMERS', quotes: ['Buy imports!', 'Not my vote!', 'Cry me a river!', 'Peasants!'] },
      { type: 'sewage', color: '#7f8c8d', label: 'SANITATION', quotes: ['Hold your nose!', 'Not glamorous!', 'No photo op!', 'Eww!'] },
    ];

    /* ─── HELPERS ───────────────────────────────────────────────── */
    const rnd = (a, b) => Math.random() * (b - a) + a;
    const ri = (a, b) => Math.floor(rnd(a, b + 1));
    const ov = (ax, ay, aw, ah, bx, by, bw, bh) => ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
    function getRandomInt(min, max) { return Math.floor(Math.random() * (Math.floor(max) - Math.ceil(min))) + Math.ceil(min); }
    function emit(x, y, color, n, spd) {
      for (let i = 0; i < n; i++) particles.push({ x, y, vx: rnd(-spd, spd), vy: rnd(-spd * 1.5, -0.5), life: ri(18, 30), maxLife: 28, color, r: rnd(2, 5) });
    }

    /* ─── OTHER SPAWNERS ────────────────────────────────────────── */
    function spawnCoin(xOff = 0) {
      coins.push({ x: scrollX + W + 60 + xOff, y: [GY - 130, GY - 170, GY - 210][ri(0, 2)], r: 15, bob: rnd(0, Math.PI * 2), done: false });
    }
    function spawnCoinCluster() {
      const y = [GY - 130, GY - 170, GY - 210][ri(0, 2)], bob = rnd(0, Math.PI * 2);
      for (let i = 0; i < 3; i++) coins.push({ x: scrollX + W + 60 + i * 40, y, r: 15, bob: bob + i * 0.5, done: false });
    }
    function spawnJournalist() {
      journalists.push({ x: scrollX + W + 150, y: GY - (49 * 2.3), w: 34 * 2.3, h: 54 * 2.3, alive: true });
    }
    function spawnScandal() {
      scandals.push({ x: scrollX + W + 100, y: GY - rnd(200, 280), r: 22, bob: rnd(0, Math.PI * 2), spin: 0, done: false });
    }

    /* ─── RESET ─────────────────────────────────────────────────── */
    function reset() {
      score = 0; health = 100; ego = 50; frame = 0; scrollX = 0; speed = 2.0; needsIgnored = 0;
      egoHits = 0; slowdown = 0; screenShake = 0; gameOverMsg = '';
      combo = 0; comboTimer = 0; invincible = 0; diffPhase = 0;
      nextSpawnFrame = 150; lastNeedRightX = -9999;
      speedLines = []; scandals = []; nextScandalFrame = 650;
      P.x = BASE_X(); P.y = GY - P.h; P.vx = 0; P.vy = 0; P.onGround = false; P.jumps = 2; P.wf = 0; P.wt = 0;
      needs = []; coins = []; journalists = []; particles = []; bubbles = [];
    }

    /* ─── INPUT ─────────────────────────────────────────────────── */
    function doJump() {
      if (state === 'start' || state === 'over') { state = 'play'; reset(); return; }
      if (state === 'play' && P.jumps > 0) {
        P.vy = JF * 1.1;
        P.vx = 5.5;
        sfx(P.jumps === 2 ? 'jump' : 'doublejump');
        if (P.jumps === 1) setTimeout(() => { P.vy = JF / 4; }, 500);
        P.onGround = false; P.jumps--;
        emit(P.x + P.w / 2, P.y + P.h, '#FFD700', 6, 3);
      }
    }
    document.addEventListener('keydown', e => { if (['Space', 'ArrowUp', 'KeyW'].includes(e.code)) { e.preventDefault(); doJump(); } });
    canvas.addEventListener('click', doJump);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); doJump(); }, { passive: false });

    /* ════════════════════════════════════════════════════════════════
       CANVAS FALLBACK DRAWING
       ════════════════════════════════════════════════════════════════ */
    function _lbl(x, y, t, c) { ctx.fillStyle = c; ctx.font = 'bold 7px monospace'; ctx.textAlign = 'center'; ctx.fillText(t, x, y); }
    function _politician(x, y) {
      const cx = x + P.w / 2;
      ctx.fillStyle = '#1a1a3e'; ctx.fillRect(cx - 11, y + P.h - 24, 10, 24); ctx.fillRect(cx + 1, y + P.h - 24, 10, 24);
      ctx.fillStyle = '#111'; ctx.fillRect(cx - 13, y + P.h - 9, 14, 9); ctx.fillRect(cx, y + P.h - 9, 14, 9);
      ctx.fillStyle = '#1a237e'; ctx.fillRect(x + 4, y + 18, P.w - 8, P.h - 34);
      ctx.fillStyle = '#ecf0f1'; ctx.fillRect(cx - 3, y + 18, 6, P.h - 40);
      ctx.fillStyle = '#c0392b';
      ctx.beginPath(); ctx.moveTo(cx - 2, y + 20); ctx.lineTo(cx + 2, y + 20);
      ctx.lineTo(cx + 1.5, y + 34); ctx.lineTo(cx, y + 38); ctx.lineTo(cx - 1.5, y + 34); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#FFD700'; ctx.fillRect(x + 6, y + 22, 7, 5);
      ctx.fillStyle = '#8B4513'; ctx.fillRect(x + P.w - 4, y + P.h - 38, 16, 20);
      ctx.strokeStyle = '#5D2906'; ctx.lineWidth = 1.5; ctx.strokeRect(x + P.w - 4, y + P.h - 38, 16, 20);
      ctx.fillStyle = '#c9a227'; ctx.fillRect(x + P.w - 1, y + P.h - 43, 10, 7);
      ctx.strokeStyle = '#a07c15'; ctx.lineWidth = 1; ctx.strokeRect(x + P.w - 1, y + P.h - 43, 10, 7);
      ctx.fillStyle = '#FDDBB4'; ctx.beginPath(); ctx.ellipse(cx, y + 14, 15, 14, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#111'; ctx.beginPath(); ctx.ellipse(cx, y + 6, 15, 9, 0, Math.PI, 0); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.fillRect(cx - 9, y + 10, 7, 6); ctx.fillRect(cx + 2, y + 10, 7, 6);
      ctx.fillStyle = '#333'; ctx.fillRect(cx - 7, y + 11, 4, 4); ctx.fillRect(cx + 4, y + 11, 4, 4);
      ctx.fillStyle = '#333'; ctx.fillRect(cx - 8, y + 8, 7, 2); ctx.fillRect(cx + 2, y + 8, 7, 2);
      ctx.strokeStyle = '#5D2906'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(cx, y + 21, 7, 0.1, Math.PI - 0.1); ctx.stroke();
      ctx.fillStyle = '#1a1a2e'; ctx.fillRect(cx - 14, y + 1, 28, 5);
      ctx.fillStyle = '#0d0d1a'; ctx.fillRect(cx - 9, y - 16, 18, 18);
      ctx.fillStyle = '#c9a227'; ctx.fillRect(cx - 9, y, 18, 4);
      ctx.fillStyle = '#FFD700'; ctx.font = '8px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('★', cx, y - 4);
    }
    function _hospital(x, y, w, h) {
      ctx.fillStyle = '#ecf0f1'; ctx.fillRect(x, y, w, h);
      ctx.fillStyle = '#e74c3c'; ctx.fillRect(x + w / 2 - 7, y + 8, 14, 36); ctx.fillRect(x + 8, y + 20, w - 16, 14);
      ctx.fillStyle = '#3498db'; ctx.fillRect(x + 6, y + 52, 12, 12); ctx.fillRect(x + w - 18, y + 52, 12, 12);
      ctx.fillStyle = '#999'; ctx.fillRect(x + w / 2 - 5, y + h - 16, 10, 16); _lbl(x + w / 2, y + h + 14, 'HOSPITAL', '#e74c3c');
    }
    function _school(x, y, w, h) {
      ctx.fillStyle = '#e8c547'; ctx.fillRect(x, y + 12, w, h - 12);
      ctx.fillStyle = '#d4a017'; ctx.beginPath(); ctx.moveTo(x - 4, y + 12); ctx.lineTo(x + w + 4, y + 12); ctx.lineTo(x + w / 2, y); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#c9a227'; ctx.beginPath(); ctx.arc(x + w / 2, y + 4, 5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#8B4513'; ctx.fillRect(x + w / 2 - 6, y + h - 18, 12, 18);
      ctx.fillStyle = '#3498db'; ctx.fillRect(x + 7, y + 22, 12, 12); ctx.fillRect(x + w - 19, y + 22, 12, 12);
      _lbl(x + w / 2, y + h + 14, 'SCHOOL', '#2980b9');
    }
    function _water(x, y, w, h) {
      ctx.fillStyle = '#1abc9c'; ctx.beginPath(); ctx.ellipse(x + w / 2, y + 20, 22, 26, 0, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#16a085'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(x + 12, y + 40); ctx.lineTo(x + 12, y + h); ctx.moveTo(x + w - 12, y + 40); ctx.lineTo(x + w - 12, y + h); ctx.stroke();
      ctx.fillStyle = '#fff'; ctx.font = '16px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('💧', x + w / 2, y + 28);
      _lbl(x + w / 2, y + h + 14, 'CLEAN WATER', '#16a085');
    }
    function _road(x, y, w, h) {
      ctx.fillStyle = '#7f8c8d'; ctx.fillRect(x, y + h - 18, w, 18); ctx.fillStyle = '#555';
      ctx.beginPath(); ctx.ellipse(x + 15, y + h - 9, 8, 5, 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x + 42, y + h - 11, 6, 4, -0.2, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#f39c12'; ctx.fillRect(x + 14, y, 36, 26);
      ctx.fillStyle = '#000'; ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('⚠ ROAD', x + w / 2, y + 11); ctx.fillText('NEEDS FIX', x + w / 2, y + 21);

      ctx.fillText("(The country won't recover this easily in real life.)", W / 2, cy + H * 0.28);
    }

    /* ─── UTILS ─────────────────────────────────────────────────── */
    function _rr(x, y, w, h, r) {
      if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2; ctx.beginPath();
      ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y); ctx.closePath();
    }

    /* ════════════════════════════════════════════════════════════════
       UPDATE
       ════════════════════════════════════════════════════════════════ */
    function update() {
      if (state !== 'play') return;
      frame++;
      const effSpeed = slowdown > 0 ? speed * (0.08 + 0.92 * (1 - slowdown / 28)) : speed;
      scrollX += effSpeed;
      if (!P.onGround) scrollX += 0.4;
      if (slowdown > 0) slowdown--;
      speed = 2.0 + score * 0.003;

      // Player movement + horizontal arc
      P.vy += GRAV; P.y += P.vy;
      P.x += P.vx; P.vx *= 0.88;
      const bx = BASE_X();
      if (P.onGround) { P.x += (bx - P.x) * 0.12; if (Math.abs(P.x - bx) < 0.8) P.x = bx; }
      P.x = Math.max(W * 0.06, Math.min(W * 0.44, P.x));
      if (P.y >= GY - P.h) { P.y = GY - P.h; P.vy = 0; P.onGround = true; P.jumps = 2; } else P.onGround = false;
      P.wt++; if (P.wt > 7) { P.wf++; P.wt = 0; }

      if (comboTimer > 0) { comboTimer--; if (comboTimer === 0) combo = 0; }
      if (invincible > 0) invincible--;

      // Speed lines
      if (speed > 3.0 && frame % 4 === 0) speedLines.push({ x: W * rnd(0.55, 1.02), y: rnd(GY * 0.15, GY * 0.9), len: rnd(30, 100) * (speed / 4), life: 7, maxLife: 7 });
      speedLines.forEach(s => s.life--); speedLines = speedLines.filter(s => s.life > 0);

      // ── SPAWN NEEDS (phase-based pattern system) ──────────────
      tickSpawn();

      // Coins
      if (frame % 100 === 0) { if (Math.random() < 0.3) spawnCoinCluster(); else spawnCoin(); }
      if (frame % 300 === 0 && score > 30) spawnJournalist();
      if (frame >= nextScandalFrame) { spawnScandal(); nextScandalFrame = frame + getRandomInt(650, 950); }

      // ── NEEDS ──────────────────────────────────────────────────
      for (const n of needs) {
        const sx = n.x - scrollX;
        // Near-miss
        if (!n.passed && !n.collided && !n.nearMiss) {
          const horizOv = P.x < sx + n.w && P.x + P.w > sx, clearance = n.y - (P.y + P.h);
          if (horizOv && clearance >= 0 && clearance < 22) {
            n.nearMiss = true; ego = Math.min(100, ego + 3); screenShake = 3; sfx('nearmiss');
            bubbles.push({ text: 'CLOSE SHAVE! 😬', style: 'nearmiss', x: P.x + P.w + 6, y: P.y - 22, life: 65, maxLife: 65 });
          }
        }
        // Solid collision
        if (ov(P.x, P.y, P.w, P.h, sx, n.y, n.w, n.h)) {
          const onTop = P.vy >= 0 && P.y + P.h <= n.y + 10 && P.y < n.y;
          if (onTop) { P.y = n.y - P.h; P.vy = 0; P.onGround = true; P.jumps = 2; }
          else if (!n.collided && invincible === 0) {
            n.collided = true; egoHits++; ego = Math.max(0, ego - 20); health = Math.min(100, health + 3);
            combo = 0; comboTimer = 0; invincible = 75; slowdown = 28; P.vy = JF * 0.38; screenShake = 10;
            sfx('hit');
            bubbles.push({ text: MUTTER_QUOTES[ri(0, MUTTER_QUOTES.length - 1)], style: 'mutter', x: P.x + P.w + 6, y: P.y - 22, life: 75, maxLife: 75 });
            emit(P.x + P.w, P.y + P.h / 2, '#8e44ad', 10, 4.5);
            if (ego <= 0) { gameOverMsg = 'ego'; endGame(); return; }
            if (health <= 0) { gameOverMsg = 'health'; endGame(); return; }
          }
        }
        // Passed
        if (!n.passed && sx + n.w < P.x - 5) {
          n.passed = true;
          if (!n.collided) {
            needsIgnored++; health = Math.max(0, health - 6); combo++; comboTimer = 200;
            const bonus = combo > 1 ? (combo - 1) * 8 : 0; score += bonus; ego = Math.min(100, ego + 6);
            sfx(combo > 1 ? 'combo' : 'sarcastic');
            bubbles.push({ text: n.quotes[ri(0, n.quotes.length - 1)], style: 'sarcastic', x: P.x + P.w + 6, y: P.y - 22, life: 90, maxLife: 90 });
            if (combo > 1 && bonus > 0) bubbles.push({ text: `×${combo} STREAK! +$${bonus}`, style: 'combo', x: P.x + P.w + 6, y: P.y - 52, life: 70, maxLife: 70 });
            emit(sx + n.w / 2, n.y + n.h / 2, '#e74c3c', 6, 3.5);
            if (health <= 0) { gameOverMsg = 'health'; endGame(); return; }
          }
        }
      }
      needs = needs.filter(n => n.x - scrollX > -200);

      // Coins
      for (const c of coins) {
        if (c.done) continue; const sx = c.x - scrollX, by = Math.sin(frame * 0.09 + c.bob) * 7;
        if (ov(P.x, P.y, P.w, P.h, sx - c.r, c.y + by - c.r, c.r * 2, c.r * 2)) {
          c.done = true; score += 15; ego = Math.min(100, ego + 0.5); sfx('coin');
          emit(sx, c.y + by, '#FFD700', 10, 5);
          bubbles.push({ text: '+$15', style: 'coin', x: sx, y: c.y + by - 20, life: 50, maxLife: 50 });
        }
      }
      coins = coins.filter(c => !c.done && c.x - scrollX > -80);

      // Scandals
      for (const s of scandals) {
        if (s.done) continue; const sx = s.x - scrollX, by = Math.sin(frame * 0.07 + s.bob) * 8;
        if (ov(P.x, P.y, P.w, P.h, sx - s.r, s.y + by - s.r, s.r * 2, s.r * 2)) {
          s.done = true; score += 50; invincible = 120; screenShake = 6; sfx('scandal');
          emit(sx, s.y + by, '#e74c3c', 18, 6);
          bubbles.push({ text: '📰 SCANDAL BURIED! +$50', style: 'scandal', x: P.x + P.w + 6, y: P.y - 22, life: 110, maxLife: 110 });
        }
      }
      scandals = scandals.filter(s => !s.done && s.x - scrollX > -100);

      // Journalists
      for (const j of journalists) {
        j.x -= 2.2; if (!j.alive) continue; const sx = j.x - scrollX;
        if (ov(P.x, P.y, P.w, P.h, sx, j.y, j.w, j.h)) {
          if (P.vy > 0 && P.y + P.h < j.y + 16) {
            j.alive = false; P.vy = JF * 0.55; score += 30; ego = Math.min(100, ego + 12); sfx('stomp');
            emit(sx + j.w / 2, j.y, '#e74c3c', 8, 4);
            bubbles.push({ text: 'FAKE NEWS!', style: 'sarcastic', x: P.x + P.w + 6, y: P.y - 22, life: 90, maxLife: 90 });
          } else if (invincible === 0) {
            j.alive = false; health = Math.min(100, health + 10); ego = Math.max(0, ego - 20); combo = 0; comboTimer = 0; invincible = 60; sfx('caught');
            emit(sx + j.w / 2, j.y + j.h / 2, '#e74c3c', 12, 5);
            bubbles.push({ text: 'NO COMMENT!', style: 'mutter', x: P.x + P.w + 6, y: P.y - 22, life: 90, maxLife: 90 });
            if (health <= 0) { gameOverMsg = 'health'; endGame(); return; }
          }
        }
      }
      journalists = journalists.filter(j => j.alive && j.x - scrollX > -200);

      particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--; });
      particles = particles.filter(p => p.life > 0);
      bubbles.forEach(b => { b.life--; b.y -= 0.5; });
      bubbles = bubbles.filter(b => b.life > 0);
      if (frame % 90 === 0) { ego = ego < 50 ? Math.min(50, ego + 1) : Math.max(50, ego - 1); }
    }

    function endGame() {
      if (score > bestScore) bestScore = score;
      sfx('gameover');
      setTimeout(() => { state = 'over'; }, 1000);
    }

    /* ─── DRAW ──────────────────────────────────────────────────── */
    function draw() {
      ctx.clearRect(0, 0, W, H);
      if (state === 'start') { drawBg(); drawPolitician(P.x || BASE_X(), GY - P.h); drawStart(); return; }
      ctx.save();
      if (screenShake > 0) { ctx.translate((Math.random() - 0.5) * screenShake * 1.2, (Math.random() - 0.5) * screenShake * 0.7); screenShake = Math.max(0, screenShake - 1); }
      drawBg(); drawSpeedLines();
      needs.forEach(drawNeed); coins.forEach(drawCoin); scandals.forEach(drawScandal);
      journalists.forEach(drawJournalist); drawPolitician(P.x, P.y);
      drawParticles(); drawBubbles();
      ctx.restore();
      drawHud();
      if (health < 25 && frame % 40 < 20) {
        ctx.fillStyle = 'rgba(231,76,60,0.2)'; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#e74c3c'; ctx.font = `bold ${Math.max(10, Math.floor(W * 0.02))}px monospace`; ctx.textAlign = 'center';
        ctx.fillText('⚠  COUNTRY IN CRISIS!  ⚠', W / 2, H - 30);
      }
      if (state === 'over') drawOver();
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    loadSprites(loop);
  </script>
</body>
